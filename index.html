<!DOCTYPE html>

<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>✈️ 우리 가족 여행</title>

<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body { font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif; background: #f0f4ff; min-height: 100vh; }

 

  /* 로그인 */

  #loginPage {

    display: flex; flex-direction: column; align-items: center; justify-content: center;

    min-height: 100vh; background: linear-gradient(135deg, #667eea, #764ba2);

  }

  .login-box {

    background: white; border-radius: 24px; padding: 40px;

    width: 90%; max-width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2);

  }

  .login-box h1 { font-size: 2rem; margin-bottom: 8px; }

  .login-box p { color: #888; margin-bottom: 28px; }

  .login-box input {

    width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 12px;

    font-size: 1rem; margin-bottom: 12px; text-align: center; letter-spacing: 4px;

  }

  .login-box input:focus { outline: none; border-color: #667eea; }

  .login-btn {

    width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);

    color: white; border: none; border-radius: 12px; font-size: 1rem;

    font-weight: bold; cursor: pointer;

  }

  .login-error { color: #e74c3c; margin-top: 10px; font-size: 0.9rem; display: none; }

 

  /* 메인 */

  #mainPage { display: none; }

  .header {

    background: linear-gradient(135deg, #667eea, #764ba2);

    color: white; padding: 20px; text-align: center; position: relative;

  }

  .header h1 { font-size: 1.4rem; }

  .logout-btn {

    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);

    background: rgba(255,255,255,0.2); color: white; border: none;

    padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;

  }

 

  /* 탭 */

  .tabs {

    display: flex; background: white; border-bottom: 2px solid #eee;

    position: sticky; top: 0; z-index: 100;

  }

  .tab {

    flex: 1; padding: 14px; text-align: center; cursor: pointer;

    font-size: 0.85rem; color: #888; border-bottom: 3px solid transparent;

    transition: all 0.2s;

  }

  .tab.active { color: #667eea; border-bottom-color: #667eea; font-weight: bold; }

 

  /* 컨텐츠 */

  .content { padding: 20px; max-width: 600px; margin: 0 auto; }

  .section { display: none; }

  .section.active { display: block; }

 

  /* 카드 */

  .card {

    background: white; border-radius: 16px; padding: 20px;

    margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);

  }

 

  /* 버튼 */

  .btn {

    padding: 10px 20px; border: none; border-radius: 10px;

    cursor: pointer; font-size: 0.9rem; font-weight: bold;

  }

  .btn-primary { background: #667eea; color: white; }

  .btn-danger { background: #ff6b6b; color: white; }

  .btn-success { background: #51cf66; color: white; }

  .btn-sm { padding: 6px 12px; font-size: 0.8rem; }

 

  /* 여행 카드 */

  .trip-card {

    background: white; border-radius: 16px; padding: 20px;

    margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);

    cursor: pointer; transition: transform 0.2s;

    border-left: 5px solid #667eea;

  }

  .trip-card:hover { transform: translateY(-2px); }

  .trip-card h3 { font-size: 1.1rem; margin-bottom: 6px; }

  .trip-card p { color: #888; font-size: 0.85rem; }

  .trip-actions { display: flex; gap: 8px; margin-top: 12px; }

 

  /* 일정 */

  .schedule-item {

    background: white; border-radius: 12px; padding: 16px;

    margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);

    border-left: 4px solid #667eea;

  }

  .schedule-item h4 { font-size: 0.95rem; margin-bottom: 4px; }

  .schedule-item p { color: #888; font-size: 0.82rem; }

 

  /* 폼 */

  .form-group { margin-bottom: 14px; }

  .form-group label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 6px; font-weight: bold; }

  .form-group input, .form-group select, .form-group textarea {

    width: 100%; padding: 10px 12px; border: 2px solid #eee;

    border-radius: 10px; font-size: 0.9rem;

  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {

    outline: none; border-color: #667eea;

  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

 

  /* 모달 */

  .modal {

    display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;

    background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;

  }

  .modal.show { display: flex; }

  .modal-box {

    background: white; border-radius: 20px; padding: 28px;

    width: 90%; max-width: 480px; max-height: 85vh; overflow-y: auto;

  }

  .modal-box h2 { margin-bottom: 20px; font-size: 1.2rem; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

 

  /* 예산 */

  .budget-summary {

    display: grid; grid-template-columns: 1fr 1fr 1fr;

    gap: 12px; margin-bottom: 20px;

  }

  .budget-box {

    background: white; border-radius: 12px; padding: 16px;

    text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);

  }

  .budget-box .label { font-size: 0.75rem; color: #888; margin-bottom: 6px; }

  .budget-box .amount { font-size: 1.1rem; font-weight: bold; }

  .budget-box.total .amount { color: #667eea; }

  .budget-box.spent .amount { color: #ff6b6b; }

  .budget-box.remain .amount { color: #51cf66; }

 

  /* 로딩 */

  .loading {

    text-align: center; padding: 40px; color: #888;

  }

 

  /* 빈 상태 */

  .empty {

    text-align: center; padding: 40px; color: #aaa;

  }

  .empty .icon { font-size: 3rem; margin-bottom: 12px; }

 

  /* 날짜 그룹 */

  .date-group { margin-bottom: 20px; }

  .date-label {

    font-size: 0.85rem; font-weight: bold; color: #667eea;

    margin-bottom: 10px; padding: 4px 10px;

    background: #f0f4ff; border-radius: 8px; display: inline-block;

  }

 

  .add-btn {

    position: fixed; bottom: 24px; right: 24px;

    width: 56px; height: 56px; border-radius: 50%;

    background: linear-gradient(135deg, #667eea, #764ba2);

    color: white; font-size: 1.8rem; border: none;

    box-shadow: 0 4px 16px rgba(102,126,234,0.5);

    cursor: pointer; display: flex; align-items: center; justify-content: center;

  }

 

  .category-badge {

    display: inline-block; padding: 2px 8px; border-radius: 6px;

    font-size: 0.75rem; margin-right: 6px;

  }

</style>

</head>

<body>

 

<!-- 로그인 페이지 -->

<div id="loginPage">

  <div class="login-box">

    <div style="font-size:3rem;margin-bottom:12px">✈️</div>

    <h1>우리 가족 여행</h1>

    <p>가족만의 여행 기록</p>

    <br>

    <input type="password" id="pwInput" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">

    <button class="login-btn" onclick="login()">로그인</button>

    <div class="login-error" id="loginError">비밀번호가 틀렸어요 😢</div>

  </div>

</div>

 

<!-- 메인 페이지 -->

<div id="mainPage">

  <div class="header">

    <h1>✈️ 우리 가족 여행</h1>

    <button class="logout-btn" onclick="logout()">로그아웃</button>

  </div>

 

  <div class="tabs">

    <div class="tab active" onclick="switchTab('trips')">🗺️ 여행</div>

    <div class="tab" onclick="switchTab('schedule')">📅 일정</div>

    <div class="tab" onclick="switchTab('budget')">💰 예산</div>

  </div>

 

  <div class="content">

    <!-- 여행 목록 -->

    <div class="section active" id="tripsSection">

      <div id="tripsList"><div class="loading">⏳ 불러오는 중...</div></div>

    </div>

 

    <!-- 일정 -->

    <div class="section" id="scheduleSection">

      <div id="tripSelector" style="margin-bottom:16px"></div>

      <div id="scheduleList"><div class="empty"><div class="icon">📅</div>여행을 선택해주세요</div></div>

    </div>

 

    <!-- 예산 -->

    <div class="section" id="budgetSection">

      <div id="budgetTripSelector" style="margin-bottom:16px"></div>

      <div id="budgetContent"></div>

    </div>

  </div>

</div>

 

<!-- 여행 추가/수정 모달 -->

<div class="modal" id="tripModal">

  <div class="modal-box">

    <h2 id="tripModalTitle">✈️ 여행 추가</h2>

    <div class="form-group">

      <label>여행 이름</label>

      <input type="text" id="tripTitle" placeholder="예) 제주도 가족여행">

    </div>

    <div class="form-group">

      <label>목적지</label>

      <input type="text" id="tripDest" placeholder="예) 제주도">

    </div>

    <div class="form-row">

      <div class="form-group">

        <label>출발일</label>

        <input type="date" id="tripStart">

      </div>

      <div class="form-group">

        <label>도착일</label>

        <input type="date" id="tripEnd">

      </div>

    </div>

    <div class="form-group">

      <label>이모지</label>

      <input type="text" id="tripEmoji" placeholder="✈️" maxlength="2">

    </div>

    <div class="modal-actions">

      <button class="btn" onclick="closeTripModal()">취소</button>

      <button class="btn btn-primary" onclick="saveTrip()">저장</button>

    </div>

  </div>

</div>

 

<!-- 일정 추가/수정 모달 -->

<div class="modal" id="scheduleModal">

  <div class="modal-box">

    <h2 id="scheduleModalTitle">📅 일정 추가</h2>

    <div class="form-group">

      <label>날짜</label>

      <input type="date" id="schedDate">

    </div>

    <div class="form-row">

      <div class="form-group">

        <label>시작 시간</label>

        <input type="time" id="schedTime">

      </div>

      <div class="form-group">

        <label>종료 시간</label>

        <input type="time" id="schedEndTime">

      </div>

    </div>

    <div class="form-group">

      <label>일정 이름</label>

      <input type="text" id="schedTitle" placeholder="예) 성산일출봉 방문">

    </div>

    <div class="form-group">

      <label>카테고리</label>

      <select id="schedCategory">

        <option value="🚗 이동">🚗 이동</option>

        <option value="🏨 숙소">🏨 숙소</option>

        <option value="🍽️ 식사">🍽️ 식사</option>

        <option value="🎡 관광">🎡 관광</option>

        <option value="🛍️ 쇼핑">🛍️ 쇼핑</option>

        <option value="☕ 카페">☕ 카페</option>

        <option value="📝 기타">📝 기타</option>

      </select>

    </div>

    <div class="form-group">

      <label>장소</label>

      <input type="text" id="schedLocation" placeholder="예) 성산일출봉">

    </div>

    <div class="form-row">

      <div class="form-group">

        <label>예산</label>

        <input type="number" id="schedBudget" placeholder="0">

      </div>

      <div class="form-group">

        <label>실제 지출</label>

        <input type="number" id="schedActual" placeholder="0">

      </div>

    </div>

    <div class="form-group">

      <label>메모</label>

      <textarea id="schedMemo" rows="2" placeholder="메모를 입력하세요"></textarea>

    </div>

    <div class="modal-actions">

      <button class="btn" onclick="closeScheduleModal()">취소</button>

      <button class="btn btn-primary" onclick="saveSchedule()">저장</button>

    </div>

  </div>

</div>

 

<script>

const API_URL = 'https://script.google.com/macros/s/AKfycbw_Wu4xLBF7W5VCTUkzc7a9LGRIn5edyXHyOnboMc9dknBR2yYU5F-oX-aGyBN-5iQ/exec';

 

let trips = [];

let schedules = [];

let selectedTripId = null;

let editingTripId = null;

let editingScheduleId = null;

let currentTab = 'trips';

 

// ── 로그인 ──

async function login() {

  const pw = document.getElementById('pwInput').value;

  if (!pw) return;

  try {

    const res = await fetch(`${API_URL}?action=checkPassword&password=${encodeURIComponent(pw)}`);

    const data = await res.json();

    if (data.success) {

      sessionStorage.setItem('loggedIn', 'true');

      document.getElementById('loginPage').style.display = 'none';

      document.getElementById('mainPage').style.display = 'block';

      loadData();

    } else {

      document.getElementById('loginError').style.display = 'block';

    }

  } catch(e) {

    alert('연결 오류! 잠시 후 다시 시도해주세요.');

  }

}

 

function logout() {

  sessionStorage.removeItem('loggedIn');

  document.getElementById('loginPage').style.display = 'flex';

  document.getElementById('mainPage').style.display = 'none';

  document.getElementById('pwInput').value = '';

}

 

// 자동 로그인 체크

if (sessionStorage.getItem('loggedIn')) {

  document.getElementById('loginPage').style.display = 'none';

  document.getElementById('mainPage').style.display = 'block';

  loadData();

}

 

// ── 데이터 로드 ──

async function loadData() {

  try {

    const res = await fetch(`${API_URL}?action=getData`);

    const data = await res.json();

    if (data.success) {

      trips = data.trips || [];

      schedules = data.schedules || [];

      renderTrips();

      renderTripSelector();

    }

  } catch(e) {

    document.getElementById('tripsList').innerHTML = '<div class="empty"><div class="icon">⚠️</div>데이터 불러오기 실패</div>';

  }

}

 

// ── 탭 전환 ──

function switchTab(tab) {

  currentTab = tab;

  document.querySelectorAll('.tab').forEach((t,i) => {

    t.classList.toggle('active', ['trips','schedule','budget'][i] === tab);

  });

  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

  document.getElementById(tab === 'trips' ? 'tripsSection' : tab === 'schedule' ? 'scheduleSection' : 'budgetSection').classList.add('active');

 

  if (tab === 'schedule') renderSchedules();

  if (tab === 'budget') renderBudget();

}

 

// ── 여행 ──

function renderTrips() {

  const el = document.getElementById('tripsList');

  if (!trips.length) {

    el.innerHTML = '<div class="empty"><div class="icon">🗺️</div>여행을 추가해보세요!</div>';

    return;

  }

  el.innerHTML = trips.map(t => `

    <div class="trip-card" style="border-left-color:${t.color||'#667eea'}">

      <div style="font-size:1.8rem">${t.emoji||'✈️'}</div>

      <h3>${t.title}</h3>

      <p>📍 ${t.destination} &nbsp;|&nbsp; 📅 ${t.startDate} ~ ${t.endDate}</p>

      <div class="trip-actions">

        <button class="btn btn-primary btn-sm" onclick="selectTrip('${t.id}')">일정 보기</button>

        <button class="btn btn-sm" style="background:#f0f4ff;color:#667eea" onclick="openEditTrip('${t.id}')">수정</button>

        <button class="btn btn-danger btn-sm" onclick="deleteTrip('${t.id}')">삭제</button>

      </div>

    </div>

  `).join('');

}

 

function renderTripSelector() {

  const sel = `

    <select class="form-group" onchange="selectTrip(this.value)" style="width:100%;padding:10px;border:2px solid #eee;border-radius:10px;font-size:0.9rem">

      <option value="">여행 선택...</option>

      ${trips.map(t => `<option value="${t.id}" ${t.id==selectedTripId?'selected':''}>${t.emoji||'✈️'} ${t.title}</option>`).join('')}

    </select>`;

  document.getElementById('tripSelector').innerHTML = sel;

  document.getElementById('budgetTripSelector').innerHTML = sel.replace('onchange="selectTrip(this.value)"', 'onchange="selectBudgetTrip(this.value)"');

}

 

function selectTrip(id) {

  selectedTripId = id;

  switchTab('schedule');

  renderTripSelector();

  renderSchedules();

}

 

function selectBudgetTrip(id) {

  selectedTripId = id;

  renderBudget();

}

 

function openAddTrip() {

  editingTripId = null;

  document.getElementById('tripModalTitle').textContent = '✈️ 여행 추가';

  document.getElementById('tripTitle').value = '';

  document.getElementById('tripDest').value = '';

  document.getElementById('tripStart').value = '';

  document.getElementById('tripEnd').value = '';

  document.getElementById('tripEmoji').value = '✈️';

  document.getElementById('tripModal').classList.add('show');

}

 

function openEditTrip(id) {

  const t = trips.find(x => x.id == id);

  if (!t) return;

  editingTripId = id;

  document.getElementById('tripModalTitle').textContent = '✈️ 여행 수정';

  document.getElementById('tripTitle').value = t.title;

  document.getElementById('tripDest').value = t.destination;

  document.getElementById('tripStart').value = t.startDate;

  document.getElementById('tripEnd').value = t.endDate;

  document.getElementById('tripEmoji').value = t.emoji || '✈️';

  document.getElementById('tripModal').classList.add('show');

}

 

function closeTripModal() {

  document.getElementById('tripModal').classList.remove('show');

}

 

async function saveTrip() {

  const title = document.getElementById('tripTitle').value.trim();

  const dest = document.getElementById('tripDest').value.trim();

  const start = document.getElementById('tripStart').value;

  const end = document.getElementById('tripEnd').value;

  const emoji = document.getElementById('tripEmoji').value || '✈️';

  if (!title || !dest || !start || !end) { alert('모든 항목을 입력해주세요!'); return; }

 

  const data = {

    id: editingTripId || Date.now().toString(),

    title, destination: dest, startDate: start, endDate: end, emoji

  };

 

  try {

    const action = editingTripId ? 'updateTrip' : 'saveTrip';

    await fetch(`${API_URL}?action=${action}&data=${encodeURIComponent(JSON.stringify(data))}`);

    closeTripModal();

    await loadData();

  } catch(e) {

    alert('저장 실패! 다시 시도해주세요.');

  }

}

 

async function deleteTrip(id) {

  if (!confirm('이 여행을 삭제할까요? 관련 일정도 모두 삭제돼요!')) return;

  try {

    await fetch(`${API_URL}?action=deleteTrip&id=${id}`);

    if (selectedTripId == id) selectedTripId = null;

    await loadData();

  } catch(e) {

    alert('삭제 실패!');

  }

}

 

// ── 일정 ──

function renderSchedules() {

  const el = document.getElementById('scheduleList');

  if (!selectedTripId) {

    el.innerHTML = '<div class="empty"><div class="icon">📅</div>여행을 선택해주세요</div>';

    return;

  }

  const list = schedules.filter(s => String(s.tripId) === String(selectedTripId))

    .sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));

 

  if (!list.length) {

    el.innerHTML = '<div class="empty"><div class="icon">📅</div>일정을 추가해보세요!</div>';

    return;

  }

 

  const grouped = {};

  list.forEach(s => {

    if (!grouped[s.date]) grouped[s.date] = [];

    grouped[s.date].push(s);

  });

 

  el.innerHTML = Object.keys(grouped).sort().map(date => `

    <div class="date-group">

      <div class="date-label">📅 ${date}</div>

      ${grouped[date].map(s => `

        <div class="schedule-item">

          <div style="display:flex;justify-content:space-between;align-items:flex-start">

            <div>

              <span class="category-badge" style="background:#f0f4ff;color:#667eea">${s.category||''}</span>

              <strong>${s.title}</strong>

            </div>

            <div style="display:flex;gap:6px">

              <button class="btn btn-sm" style="background:#f0f4ff;color:#667eea" onclick="openEditSchedule('${s.id}')">수정</button>

              <button class="btn btn-danger btn-sm" onclick="deleteSchedule('${s.id}')">삭제</button>

            </div>

          </div>

          <p style="margin-top:6px">

            ${s.time ? `⏰ ${s.time}${s.endTime?' ~ '+s.endTime:''}` : ''}

            ${s.location ? `&nbsp; 📍 ${s.location}` : ''}

          </p>

          ${s.budget||s.actual ? `<p>💰 예산 ${Number(s.budget||0).toLocaleString()}원 / 실지출 ${Number(s.actual||0).toLocaleString()}원</p>` : ''}

          ${s.memo ? `<p style="color:#aaa;font-size:0.8rem;margin-top:4px">📝 ${s.memo}</p>` : ''}

        </div>

      `).join('')}

    </div>

  `).join('');

}

 

function openAddSchedule() {

  if (!selectedTripId) { alert('먼저 여행을 선택해주세요!'); return; }

  editingScheduleId = null;

  document.getElementById('scheduleModalTitle').textContent = '📅 일정 추가';

  document.getElementById('schedDate').value = '';

  document.getElementById('schedTime').value = '';

  document.getElementById('schedEndTime').value = '';

  document.getElementById('schedTitle').value = '';

  document.getElementById('schedCategory').value = '🎡 관광';

  document.getElementById('schedLocation').value = '';

  document.getElementById('schedBudget').value = '';

  document.getElementById('schedActual').value = '';

  document.getElementById('schedMemo').value = '';

  document.getElementById('scheduleModal').classList.add('show');

}

 

function openEditSchedule(id) {

  const s = schedules.find(x => x.id == id);

  if (!s) return;

  editingScheduleId = id;

  document.getElementById('scheduleModalTitle').textContent = '📅 일정 수정';

  document.getElementById('schedDate').value = s.date;

  document.getElementById('schedTime').value = s.time;

  document.getElementById('schedEndTime').value = s.endTime;

  document.getElementById('schedTitle').value = s.title;

  document.getElementById('schedCategory').value = s.category;

  document.getElementById('schedLocation').value = s.location;

  document.getElementById('schedBudget').value = s.budget;

  document.getElementById('schedActual').value = s.actual;

  document.getElementById('schedMemo').value = s.memo;

  document.getElementById('scheduleModal').classList.add('show');

}

 

function closeScheduleModal() {

  document.getElementById('scheduleModal').classList.remove('show');

}

 

async function saveSchedule() {

  const title = document.getElementById('schedTitle').value.trim();

  const date = document.getElementById('schedDate').value;

  if (!title || !date) { alert('날짜와 일정 이름은 필수예요!'); return; }

 

  const data = {

    id: editingScheduleId || Date.now().toString(),

    tripId: selectedTripId,

    date, title,

    time: document.getElementById('schedTime').value,

    endTime: document.getElementById('schedEndTime').value,

    category: document.getElementById('schedCategory').value,

    location: document.getElementById('schedLocation').value,

    budget: document.getElementById('schedBudget').value,

    actual: document.getElementById('schedActual').value,

    memo: document.getElementById('schedMemo').value,

  };

 

  try {

    const action = editingScheduleId ? 'updateSchedule' : 'saveSchedule';

    await fetch(`${API_URL}?action=${action}&data=${encodeURIComponent(JSON.stringify(data))}`);

    closeScheduleModal();

    await loadData();

    renderSchedules();

  } catch(e) {

    alert('저장 실패! 다시 시도해주세요.');

  }

}

 

async function deleteSchedule(id) {

  if (!confirm('이 일정을 삭제할까요?')) return;

  try {

    await fetch(`${API_URL}?action=deleteSchedule&id=${id}`);

    await loadData();

    renderSchedules();

  } catch(e) {

    alert('삭제 실패!');

  }

}

 

// ── 예산 ──

function renderBudget() {

  const el = document.getElementById('budgetContent');

  if (!selectedTripId) {

    el.innerHTML = '<div class="empty"><div class="icon">💰</div>여행을 선택해주세요</div>';

    return;

  }

  const list = schedules.filter(s => String(s.tripId) === String(selectedTripId));

  const totalBudget = list.reduce((sum,s) => sum + Number(s.budget||0), 0);

  const totalActual = list.reduce((sum,s) => sum + Number(s.actual||0), 0);

  const remain = totalBudget - totalActual;

 

  el.innerHTML = `

    <div class="budget-summary">

      <div class="budget-box total">

        <div class="label">총 예산</div>

        <div class="amount">${totalBudget.toLocaleString()}원</div>

      </div>

      <div class="budget-box spent">

        <div class="label">실제 지출</div>

        <div class="amount">${totalActual.toLocaleString()}원</div>

      </div>

      <div class="budget-box remain">

        <div class="label">남은 예산</div>

        <div class="amount">${remain.toLocaleString()}원</div>

      </div>

    </div>

    <div class="card">

      <h3 style="margin-bottom:14px">💳 지출 내역</h3>

      ${list.filter(s => s.actual).map(s => `

        <div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0">

          <div>

            <span style="font-size:0.85rem">${s.category||''}</span>

            <span style="margin-left:8px">${s.title}</span>

            <div style="font-size:0.75rem;color:#aaa">${s.date}</div>

          </div>

          <div style="text-align:right">

            <div style="color:#ff6b6b;font-weight:bold">${Number(s.actual).toLocaleString()}원</div>

            <div style="font-size:0.75rem;color:#aaa">예산 ${Number(s.budget||0).toLocaleString()}원</div>

          </div>

        </div>

      `).join('') || '<div style="color:#aaa;text-align:center;padding:20px">지출 내역이 없어요</div>'}

    </div>

  `;

}
